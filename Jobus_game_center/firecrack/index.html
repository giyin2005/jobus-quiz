<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點擊放烟花效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0a0a2a;
            color: #fff;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            cursor: pointer;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        
        header {
            padding: 40px 20px 30px;
            background-color: rgba(10, 10, 40, 0.7);
            border-radius: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            font-size: 3.2rem;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ffcce6, #ffe680, #e6f7ff, #ccccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        
        .subtitle {
            font-size: 1.3rem;
            color: #aaaaff;
            margin-bottom: 25px;
        }
        
        .instructions {
            font-size: 1.1rem;
            color: #aaa;
            max-width: 600px;
            margin: 0 auto 40px;
            line-height: 1.6;
            padding: 20px;
            background-color: rgba(20, 20, 60, 0.5);
            border-radius: 12px;
        }
        
        .color-palette {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .color-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .color-label {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .color-demo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            box-shadow: 0 0 15px currentColor;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            background-color: rgba(60, 60, 100, 0.7);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        #autoBtn {
            background-color: rgba(255, 102, 204, 0.3);
        }
        
        #clearBtn {
            background-color: rgba(255, 153, 51, 0.3);
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .stat-box {
            background-color: rgba(30, 30, 70, 0.6);
            padding: 15px 25px;
            border-radius: 12px;
            min-width: 150px;
        }
        
        .stat-value {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 1rem;
            color: #aaaaff;
        }
        
        #fireworksCount {
            color: #ff99cc;
        }
        
        #clickCount {
            color: #ffcc66;
        }
        
        footer {
            margin-top: 40px;
            color: #888;
            font-size: 0.9rem;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .color-palette {
                gap: 15px;
            }
            
            .color-demo {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <canvas id="fireworksCanvas"></canvas>
    
    <div class="container">
        <header>
            <h1>✨ 2026元宵節點擊放煙花 ✨</h1>
            <p class="subtitle">點擊頁面任意位置釋放彩色煙花</p>
        </header>
        
        <div class="instructions">
            點擊頁面任何地方即可釋放彩色煙花！煙花有四種顏色：淺粉色、金色、銀色和粉藍色，煙花會自動隨機選擇顏色。
        </div>
        
        <div class="color-palette">
            <div class="color-item">
                <div class="color-label">淺粉色</div>
                <div class="color-demo" style="color: #ffcce6; background-color: #ffcce6;"></div>
            </div>
            <div class="color-item">
                <div class="color-label">金色</div>
                <div class="color-demo" style="color: #ffd700; background-color: #ffd700;"></div>
            </div>
            <div class="color-item">
                <div class="color-label">銀色</div>
                <div class="color-demo" style="color: #e6e6fa; background-color: #e6e6fa;"></div>
            </div>
            <div class="color-item">
                <div class="color-label">粉藍色</div>
                <div class="color-demo" style="color: #b3e0ff; background-color: #b3e0ff;"></div>
            </div>
        </div>
        
        <div class="controls">
            <button id="autoBtn">自動煙花模式</button>
            <button id="clearBtn">清除所有煙花</button>
        </div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="fireworksCount">0</div>
                <div class="stat-label">煙花數量</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="clickCount">0</div>
                <div class="stat-label">點擊次數</div>
            </div>
        </div>
        
        <footer>
            <p>點擊頁面任意位置釋放彩色煙花 | 2026年丙午馬年元宵節</p>
        </footer>
    </div>

    <script>
        // 獲取Canvas元素和上下文
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        
        // 設置Canvas尺寸為窗口大小
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // 煙花顏色定義
        const colors = {
            lightPink: {r: 255, g: 204, b: 230}, // 淺粉色
            gold: {r: 255, g: 215, b: 0},        // 金色
            silver: {r: 230, g: 230, b: 250},    // 銀色
            pinkBlue: {r: 179, g: 224, b: 255}   // 粉藍色
        };
        
        // 统计变量
        let fireworksCount = 0;
        let clickCount = 0;
        let autoMode = false;
        let autoInterval = null;
        
        // 更新统计显示
        function updateStats() {
            document.getElementById('fireworksCount').textContent = fireworksCount;
            document.getElementById('clickCount').textContent = clickCount;
        }
        
        // 烟花粒子类
        class Particle {
            constructor(x, y, color, velocityX, velocityY, size = 2) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocityX = velocityX;
                this.velocityY = velocityY;
                this.size = size;
                this.alpha = 1; // 透明度
                this.gravity = 0.05;
                this.decay = 0.015; // 粒子消失速度
                this.friction = 0.97; // 摩擦力
            }
            
            update() {
                this.velocityX *= this.friction;
                this.velocityY *= this.friction;
                this.velocityY += this.gravity;
                
                this.x += this.velocityX;
                this.y += this.velocityY;
                this.alpha -= this.decay;
                
                return this.alpha > 0;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // 烟花类
        class Firework {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.particles = [];
                this.createParticles();
                fireworksCount++;
                updateStats();
            }
            
            createParticles() {
                const particleCount = 100;
                const power = 5;
                
                for (let i = 0; i < particleCount; i++) {
                    // 随机角度和速度
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * power + 1;
                    
                    const velocityX = Math.cos(angle) * speed;
                    const velocityY = Math.sin(angle) * speed;
                    
                    // 随机粒子大小
                    const size = Math.random() * 2 + 1;
                    
                    this.particles.push(
                        new Particle(this.x, this.y, this.color, velocityX, velocityY, size)
                    );
                }
            }
            
            update() {
                // 更新所有粒子
                this.particles = this.particles.filter(particle => particle.update());
                
                // 如果所有粒子都消失了，返回false表示烟花可以移除
                return this.particles.length > 0;
            }
            
            draw() {
                this.particles.forEach(particle => particle.draw());
            }
        }
        
        // 存储所有烟花的数组
        let fireworks = [];
        
        // 创建烟花
        function createFirework(x, y) {
            // 随机选择一种颜色
            const colorKeys = Object.keys(colors);
            const randomColorKey = colorKeys[Math.floor(Math.random() * colorKeys.length)];
            const color = colors[randomColorKey];
            
            // 创建新烟花
            fireworks.push(new Firework(x, y, color));
        }
        
        // 清除所有烟花
        function clearFireworks() {
            fireworks = [];
            fireworksCount = 0;
            updateStats();
        }
        
        // 动画循环
        function animate() {
            // 用半透明黑色清除画布，产生拖尾效果
            ctx.fillStyle = 'rgba(10, 10, 42, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 更新和绘制所有烟花
            fireworks = fireworks.filter(firework => {
                firework.draw();
                return firework.update();
            });
            
            requestAnimationFrame(animate);
        }
        
        // 初始化
        function init() {
            // 开始动画循环
            animate();
            
            // 点击事件：创建烟花
            document.addEventListener('click', (e) => {
                clickCount++;
                createFirework(e.clientX, e.clientY);
                updateStats();
            });
            
            // 自動烟花按钮
            document.getElementById('autoBtn').addEventListener('click', function() {
                autoMode = !autoMode;
                
                if (autoMode) {
                    this.textContent = '停止自動烟花';
                    
                    // 每隔200毫秒在随机位置创建烟花
                    autoInterval = setInterval(() => {
                        const x = Math.random() * canvas.width;
                        const y = Math.random() * canvas.height;
                        createFirework(x, y);
                    }, 200);
                } else {
                    this.textContent = '自動烟花模式';
                    clearInterval(autoInterval);
                }
            });
            
            // 清除烟花按钮
            document.getElementById('clearBtn').addEventListener('click', clearFireworks);
            
            // 窗口大小调整时重新设置Canvas尺寸
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
            
            // 初始化时创建几个烟花
            setTimeout(() => {
                createFirework(canvas.width * 0.2, canvas.height * 0.5);
            }, 300);
            
            setTimeout(() => {
                createFirework(canvas.width * 0.5, canvas.height * 0.3);
            }, 800);
            
            setTimeout(() => {
                createFirework(canvas.width * 0.8, canvas.height * 0.6);
            }, 1300);
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
